<div class="pb-16 max-w-8xl mx-auto px-4 xl:px-0">
  <h2 class="text-2xl text-green-600 font-bold mb-6">Shop Popular Products</h2>
  <div
    class="row grid gap-3 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5"
  >
    @for (item of productList(); track item.id) {
      <app-card [data]="item"></app-card>
    }
  </div>
  <div class="flex justify-center items-center mt-8 max-w-4xl mx-auto">
    <button routerLink="/products" class="btn-main py-3 rounded-base px-4 text-lg w-full">
      View More Products
    </button>
  </div>
</div>
