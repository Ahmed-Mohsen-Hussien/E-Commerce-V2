<section class="pb-4 max-w-8xl mx-auto px-4 xl:px-0">
  <h2 class="text-2xl text-green-600 font-bold mb-6">Shop Popular Categories</h2>
  <owl-carousel-o [options]="categoriesOptions">
    @for (item of categoriesList(); track item._id) {
      <ng-template carouselSlide [id]="item._id">
        <div class="mx-2">
          <img
            (click)="setCategoryId(item._id)"
            routerLink="/products"
            class="w-50 h-40 sm:w-50 sm:h-50 md:w-48 md:h-50 rounded-2xl shadow cursor-pointer"
            [src]="item.image"
            [alt]="item.name"
            [title]="item.name"
          />
          <h3 class="text-green-600 py-2 font-semibold text-lg text-center">{{ item.name }}</h3>
        </div>
      </ng-template>
    }
  </owl-carousel-o>
</section>
