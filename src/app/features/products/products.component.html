<div class="py-16 max-w-8xl mx-auto px-5 xl:px-0">
  <h2 class="text-3xl text-green-600 font-bold mb-6 text-center">Shop All Products</h2>
  <div class="relative mb-5 max-w-4xl mx-auto">
    <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
      <svg
        class="w-4 h-4 text-gray-400"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        fill="none"
        viewBox="0 0 20 20"
      >
        <path
          stroke="currentColor"
          stroke-linecap="round"
          stroke-width="2"
          d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
        />
      </svg>
    </div>
    <input
      [(ngModel)]="searchWord"
      type="search"
      id="search"
      class="block w-full px-2.5 py-3 ps-9 bg-neutral-secondary-medium border border-default-medium rounded-lg focus:ring-green-500 focus:border-blue-400/20 focus:bg-white placeholder:text-gray-400 placeholder:text-base"
      placeholder="Search for products..."
    />
  </div>
  <div
    class="row grid gap-3 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5"
  >
    @for (item of productList() | paginate: pagination | search: searchWord; track item.id) {
      <app-card [data]="item"></app-card>
    } @empty {}
  </div>
  <div class="flex flex-wrap justify-center py-6">
    <pagination-controls
      class="my-pagination"
      id="products"
      (pageChange)="pageChanged($event)"
      (pageBoundsCorrection)="pageChanged($event)"
    >
    </pagination-controls>
  </div>
</div>
